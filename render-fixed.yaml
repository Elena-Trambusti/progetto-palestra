# Configurazione Render corretta per servire frontend + backend
services:
  - type: web
    name: palestra-backend
    runtime: node
    rootDir: server
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: REQUIRE_AUTH
        value: "true"
      - key: AUTH_PASSWORD
        generateValue: true
      - key: INGEST_SECRET
        generateValue: true
      - key: TRUST_PROXY
        value: "true"
      - key: CORS_ORIGIN
        value: https://progetto-palestra.onrender.com
      - key: DATA_DIR
        value: /var/data
    disks:
      - name: palestra-data
        mountPath: /var/data
        sizeGB: 1

  - type: web
    name: palestra-frontend
    runtime: static
    rootDir: build
    plan: free
    autoDeploy: true
    buildCommand: cd .. && bash scripts/render-build.sh
    routes:
      - type: redirect
        source: /api/*
        destination: https://palestra-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_SENSOR_API_URL
        value: https://palestra-backend.onrender.com
      - key: REACT_APP_SENSOR_WS_URL
        value: wss://palestra-backend.onrender.com/ws
