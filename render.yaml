# Un solo servizio Web: CRA build + API + static file da Express (niente react-scripts start in produzione).
services:
  - type: web
    name: palestra-app
    runtime: node
    rootDir: .
    plan: free
    autoDeploy: true
    # Un solo comando: niente && multilinea spezzata nel pannello Render (quello dava "npm help" e exit 1).
    buildCommand: bash scripts/render-build.sh
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: REQUIRE_AUTH
        value: "true"
      - key: AUTH_PASSWORD
        generateValue: true
      - key: INGEST_SECRET
        generateValue: true
      - key: TRUST_PROXY
        value: "true"
      # Stesso dominio dell'app: origine esatta del browser (HTTPS Render), es. https://palestra-app.onrender.com
      - key: CORS_ORIGIN
        sync: false
      - key: DATA_DIR
        value: /var/data
    disks:
      - name: palestra-data
        mountPath: /var/data
        sizeGB: 1
