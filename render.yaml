# Un solo servizio Web: CRA build + API + static file da Express (niente react-scripts start in produzione).
services:
  - type: web
    name: palestra-app
    runtime: node
    rootDir: .
    plan: free
    autoDeploy: true
    buildCommand: npm install --no-audit --no-fund && npm install --prefix server --no-audit --no-fund && NODE_OPTIONS="--max-old-space-size=3072" npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: REQUIRE_AUTH
        value: "true"
      - key: AUTH_PASSWORD
        generateValue: true
      - key: INGEST_SECRET
        generateValue: true
      - key: TRUST_PROXY
        value: "true"
      # Stesso dominio dell'app: origine esatta del browser (HTTPS Render), es. https://palestra-app.onrender.com
      - key: CORS_ORIGIN
        sync: false
      - key: DATA_DIR
        value: /var/data
    disks:
      - name: palestra-data
        mountPath: /var/data
        sizeGB: 1
